    <meta name="description" content="Cendekia — Learning Management System kampus modern." />
    <title>Cendekia · LMS Kampus</title>
    <script>
      // Set theme before paint to avoid flash.
      // Default: DARK on first visit. If the user has chosen a theme before,
      // respect that choice (they can switch to light anytime).
      (function () {
        try {
          const t = localStorage.getItem('cendekia-theme');
          const dark = t ? t === 'dark' : true;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
